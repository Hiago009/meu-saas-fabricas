<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Acesso ao Sistema</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border-top: 5px solid #4f46e5; }
        
        h1 { color: #1f2937; margin-bottom: 5px; font-size: 24px; }
        p { color: #6b7280; margin-top: 0; margin-bottom: 30px; font-size: 14px; }
        
        .grupo-input { text-align: left; margin-bottom: 15px; }
        .grupo-input label { display: block; font-size: 13px; font-weight: bold; color: #374151; margin-bottom: 5px; }
        
        input { width: 100%; padding: 15px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.2s; background: #f9fafb; }
        input:focus { border-color: #4f46e5; background: white; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        
        button { width: 100%; background: #4f46e5; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        button:hover { background: #4338ca; transform: translateY(-1px); }
        
        .erro { background: #fee2e2; color: #b91c1c; padding: 10px; border-radius: 6px; margin-top: 15px; font-size: 14px; font-weight: bold; display: none; border: 1px solid #f87171; }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>📦 Gestão de Confecção</h1>
        <p>Acesse o painel da sua fábrica</p>

        <div class="grupo-input">
            <label>E-mail de Acesso</label>
            <input type="email" id="email" placeholder="exemplo@email.com" autofocus autocomplete="email">
        </div>

        <div class="grupo-input">
            <label>Senha</label>
            <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
        </div>
        
        <button onclick="fazerLogin()">Entrar no Painel</button>
        
        <div id="mensagem-erro" class="erro"></div>
    </div>

    <script>
        // Limpa qualquer resquício de login antigo
        localStorage.removeItem('usuarioLogado');

        async function fazerLogin() {
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value.trim();
            const divErro = document.getElementById('mensagem-erro');

            if (!email || !senha) {
                mostrarErro("⚠️ Preencha o e-mail e a senha!");
                return;
            }

            divErro.style.display = "none"; // Esconde erro antigo
            const btn = document.querySelector('button');
            btn.innerText = "Verificando...";
            btn.style.opacity = "0.7";

            try {
                const resposta = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login: email, senha: senha })
                });

                const dados = await resposta.json();

                if (resposta.ok) {
                    // 🎉 Sucesso! Guarda o crachá e vai para o sistema principal
                    localStorage.setItem('usuarioLogado', JSON.stringify(dados.usuario));
                    window.location.href = '/';
                } else {
                    // 🛑 Barrado (Senha errada, Bloqueado pelo Dono do SaaS, etc)
                    mostrarErro("❌ " + dados.erro);
                    btn.innerText = "Entrar no Painel";
                    btn.style.opacity = "1";
                }
            } catch (erro) {
                mostrarErro("⚠️ Erro ao conectar com o servidor.");
                btn.innerText = "Entrar no Painel";
                btn.style.opacity = "1";
            }
        }

        function mostrarErro(msg) {
            const divErro = document.getElementById('mensagem-erro');
            divErro.innerText = msg;
            divErro.style.display = "block";
        }
        
        // Permite usar a tecla Enter para tentar logar
        document.addEventListener('keypress', function(e) {
            if(e.key === 'Enter') fazerLogin();
        });
    </script>
</body>
</html>
